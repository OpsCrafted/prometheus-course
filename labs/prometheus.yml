global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          group: 'system'

  - job_name: 'sample-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['sample-app:8080']
        labels:
          group: 'application'

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          group: 'database'

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          group: 'cache'

  - job_name: 'blackbox'
    static_configs:
      - targets: ['localhost:9115']
        labels:
          group: 'monitoring'
