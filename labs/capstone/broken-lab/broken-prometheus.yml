# BROKEN Prometheus config with 5 intentional bugs
# Your job: find and fix them all

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # BUG 1: Wrong port number (9100 instead of 9100)
  - job_name: 'node-exporter-broken'
    static_configs:
      - targets: ['localhost:9999']  # BUG: Wrong port

  # BUG 2: Missing colon in targets (syntax error)
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost9090']  # BUG: Missing colon

  # BUG 3: Typo in relabel_action (keep instead of replace)
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'pg_.*'
        action: 'kep'  # BUG: Typo (should be 'keep')

  # BUG 4: Missing required 'targets' field
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
      - {}  # BUG: Empty config, missing targets

  # BUG 5: Indentation error in relabel_configs
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
    metric_relabel_configs:
    - source_labels: [__name__]  # BUG: Wrong indentation (should be 2 spaces)
      regex: 'alertmanager_.*'
      action: 'keep'
