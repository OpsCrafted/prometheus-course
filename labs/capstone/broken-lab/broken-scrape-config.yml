# BROKEN scrape config snippet
# Used alongside broken-prometheus.yml for the debugging exercise
# This file demonstrates additional scrape config mistakes

scrape_configs:
  # BUG: scheme typo (should be 'http' or 'https')
  - job_name: 'app-metrics'
    scheme: 'htpp'  # BUG: Typo in scheme
    static_configs:
      - targets: ['app:8080']
    metrics_path: '/metrics'

  # BUG: scrape_timeout longer than scrape_interval
  - job_name: 'slow-exporter'
    scrape_interval: 10s
    scrape_timeout: 30s  # BUG: timeout (30s) exceeds interval (10s)
    static_configs:
      - targets: ['slow-exporter:9200']
